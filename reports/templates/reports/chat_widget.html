{% load static %}
<div id="consultancy-chat-root" class="fixed bottom-4 right-4 z-40">
    <button id="consultancy-chat-toggle" class="flex items-center gap-2 rounded-full bg-slate-950 px-4 py-3 text-sm font-semibold text-white shadow-2xl shadow-slate-900/20 transition hover:bg-slate-800">
        <span class="text-lg">💬</span>
        <span>Consultancy Centre</span>
    </button>

    <div id="consultancy-chat-panel" class="mt-3 hidden w-[92vw] max-w-[420px] rounded-[1.75rem] border border-slate-200 bg-white shadow-2xl shadow-slate-900/20">
        <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3">
            <div>
                <p class="text-sm font-semibold text-slate-900">Consultancy Centre</p>
                <p class="text-xs text-slate-500">AI assistant for projects, reports, and consultancy topics</p>
            </div>
            <button id="consultancy-chat-close" class="rounded-full border border-slate-200 px-2 py-1 text-sm text-slate-600" type="button">✕</button>
        </div>

        <div id="consultancy-chat-messages" class="flex h-80 flex-col gap-3 overflow-y-auto bg-slate-50/70 p-4"></div>

        <div class="border-t border-slate-200 p-3">
            <textarea id="consultancy-chat-input" rows="3" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm outline-none focus:border-teal-500" placeholder="Ask about projects, reports, costs, procurement, safety, or dashboard use..."></textarea>
            <div class="mt-2 flex items-center justify-between gap-2">
                <p class="text-[11px] text-slate-500">Free and open-source assistant · Ollama if available, otherwise a helpful fallback reply</p>
                <button id="consultancy-chat-send" class="rounded-full bg-slate-950 px-3 py-2 text-sm font-semibold text-white" type="button">Send</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function(){
    const root = document.getElementById('consultancy-chat-root');
    if (!root) return;
    const toggle = document.getElementById('consultancy-chat-toggle');
    const close = document.getElementById('consultancy-chat-close');
    const panel = document.getElementById('consultancy-chat-panel');
    const messagesBox = document.getElementById('consultancy-chat-messages');
    const input = document.getElementById('consultancy-chat-input');
    const sendBtn = document.getElementById('consultancy-chat-send');
    const storageKey = 'consultancy-centre-chat-history';

    const getCookie = (name) => {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? decodeURIComponent(match[2]) : '';
    };

    const formatTime = (value) => {
        const date = new Date(value);
        return date.toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'});
    };

    let state = [];

    const loadHistory = () => {
        try {
            state = JSON.parse(sessionStorage.getItem(storageKey) || '[]');
        } catch (error) {
            state = [];
        }
        renderMessages();
    };

    const saveHistory = () => {
        sessionStorage.setItem(storageKey, JSON.stringify(state));
    };

    const appendMessage = (role, content, timestamp) => {
        state.push({role, content, timestamp: timestamp || new Date().toISOString()});
        saveHistory();
        renderMessages();
    };

    const renderMessages = () => {
        if (!messagesBox) return;
        messagesBox.innerHTML = '';
        if (!state.length) {
            const welcome = document.createElement('div');
            welcome.className = 'rounded-2xl border border-slate-200 bg-white p-3 text-sm text-slate-600';
            welcome.innerHTML = '<p class="font-semibold text-slate-900">Hello 👋</p><p class="mt-1">Ask me about projects, reports, procurement, cost estimation, safety, or how to use this dashboard.</p>';
            messagesBox.appendChild(welcome);
        }
        state.forEach((entry) => {
            const item = document.createElement('div');
            item.className = entry.role === 'user' ? 'ml-auto max-w-[85%] rounded-2xl bg-slate-950 px-3 py-2 text-sm text-white' : 'mr-auto max-w-[85%] rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700';
            const label = document.createElement('div');
            label.className = entry.role === 'user' ? 'mb-2 text-[11px] uppercase tracking-[0.16em] text-slate-400' : 'mb-2 text-[11px] uppercase tracking-[0.16em] text-slate-500';
            label.textContent = entry.role === 'user' ? 'You' : 'Consultancy Centre';
            const body = document.createElement('div');
            body.className = 'prose prose-sm max-w-none prose-slate';
            body.innerHTML = marked.parse(entry.content || '');
            const footer = document.createElement('div');
            footer.className = 'mt-2 flex items-center justify-between gap-2 text-[11px] text-slate-400';
            footer.innerHTML = `<span>${formatTime(entry.timestamp)}</span>${entry.role === 'assistant' ? '<button type="button" class="copy-btn rounded-full border border-slate-200 px-2 py-1 text-[11px] text-slate-600">Copy</button>' : ''}`;
            item.appendChild(label);
            item.appendChild(body);
            item.appendChild(footer);
            messagesBox.appendChild(item);
        });
        messagesBox.scrollTop = messagesBox.scrollHeight;
    };

    const setLoading = (isLoading) => {
        if (!sendBtn) return;
        sendBtn.disabled = isLoading;
        sendBtn.textContent = isLoading ? 'Thinking…' : 'Send';
    };

    const sendMessage = async () => {
        if (!input || !input.value.trim()) return;
        const text = input.value.trim();
        input.value = '';
        appendMessage('user', text);
        setLoading(true);
        const assistantPlaceholder = document.createElement('div');
        assistantPlaceholder.className = 'mr-auto max-w-[85%] rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700';
        assistantPlaceholder.innerHTML = '<div class="text-[11px] uppercase tracking-[0.16em] text-slate-500">Consultancy Centre</div><div class="mt-2 flex items-center gap-2 text-slate-500"><span class="inline-block h-2 w-2 animate-pulse rounded-full bg-slate-400"></span><span>Thinking…</span></div>';
        messagesBox.appendChild(assistantPlaceholder);
        messagesBox.scrollTop = messagesBox.scrollHeight;
        try {
            const response = await fetch('/chat/api/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                    'X-Requested-With': 'XMLHttpRequest',
                },
                body: JSON.stringify({message: text}),
            });
            const data = await response.json();
            messagesBox.removeChild(assistantPlaceholder);
            if (!response.ok) {
                appendMessage('assistant', data.error || 'Sorry, I could not respond right now.');
            } else {
                appendMessage('assistant', data.reply || 'No response received.');
            }
        } catch (error) {
            messagesBox.removeChild(assistantPlaceholder);
            appendMessage('assistant', 'Sorry, the assistant is unavailable right now.');
        } finally {
            setLoading(false);
            input.focus();
        }
    };

    toggle?.addEventListener('click', () => {
        panel.classList.toggle('hidden');
    });
    close?.addEventListener('click', () => {
        panel.classList.add('hidden');
    });

    sendBtn?.addEventListener('click', sendMessage);
    input?.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });

    messagesBox?.addEventListener('click', (event) => {
        const button = event.target.closest('.copy-btn');
        if (!button) return;
        const text = button.closest('div')?.previousElementSibling?.textContent || '';
        navigator.clipboard.writeText(text);
        button.textContent = 'Copied';
        setTimeout(() => { button.textContent = 'Copy'; }, 1200);
    });

    loadHistory();
})();
</script>
