{% extends "base.html" %}
{% block title %}Delete IPS Review | IntelleGo{% endblock %}
{% block content %}
<section class="mx-auto max-w-2xl rounded-[2rem] border border-white/80 bg-white p-8 shadow-panel">
    <p class="text-xs uppercase tracking-[0.3em] text-slate-500">Business Development Module</p>
    <h2 class="mt-2 text-3xl font-semibold text-slate-900">Delete IPS Review</h2>
    <p class="mt-3 text-sm text-slate-600">Are you sure you want to delete {{ obj.fund_name }}?</p>
    <form method="post" class="mt-6 flex flex-wrap gap-3">{% csrf_token %}
        <button class="rounded-full bg-rose-600 px-5 py-3 font-semibold text-white hover:bg-rose-700" type="submit">Delete</button>
        <a class="rounded-full border border-slate-200 px-5 py-3 font-semibold text-slate-700" href="{% url 'ips_reviews_list' %}">Cancel</a>
    </form>
</section>
{% endblock %}
