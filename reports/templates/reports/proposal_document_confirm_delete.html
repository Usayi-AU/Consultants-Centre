{% extends "base.html" %}
{% block title %}Delete Document | IntelleGo{% endblock %}
{% block content %}
<section class="mx-auto max-w-2xl rounded-[2rem] border border-white/80 bg-white p-6 shadow-panel">
    <h1 class="text-3xl font-semibold text-slate-900">Delete document</h1>
    <p class="mt-3 text-sm text-slate-600">Remove this attached document from the proposal.</p>

    <div class="mt-6 rounded-2xl border border-slate-200 bg-slate-50 p-4">
        <p class="font-semibold text-slate-900">{{ document.document_name|default:document.file.name }}</p>
        <p class="mt-1 text-sm text-slate-600">{{ proposal.proposal_name }}</p>
    </div>

    <form method="post" class="mt-6 flex flex-wrap justify-end gap-3">
        {% csrf_token %}
        <a class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700" href="{% url 'proposal_detail' proposal.pk %}">Cancel</a>
        <button type="submit" class="rounded-full bg-rose-600 px-4 py-2 text-sm font-semibold text-white">Delete document</button>
    </form>
</section>
{% endblock %}
